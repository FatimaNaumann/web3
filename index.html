<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>F1 Pit Stop</title>
</head>
  <body>
    <header>
      <h1 class="pulse-text">F1 pit stop</h1>
      <p>Click a car to visit a team website </p>
    </header>
    
    <div class="container">
      <div class="grid">
        <div class="card">
          <a href="https://www.mercedesamgf1.com/">
            <img src="mercedes.jpg" width="100" alt="Mercedes">
          </a>
          <h3>Mercedes</h3>
        </div>
        
         <div class="card">
          <a href="https://www.mclaren.com/racing/">
            <img src="mclaren.jpg" width="100" alt="McLaren">
          </a>
           <h3>Mclaren</h3>
         </div>
         
         <div class="card">
          <a href="https://www.williamsf1.com/">
            <img src="williams.jpg" width="100" alt="Williams">
          </a>
           <h3>Williams</h3>
         </div>
      </div>
    </div>
  </body>
</html>
