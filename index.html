<!DOCTYPE html>
<html lang="en">
<head> 
 <link rel="stylesheet" href="style.css">
 <title>F1 Pit Stop</title>
</head>
  <body>
    <header>
      <h1 class="pulse-text">F1 pit stop</h1>
      <p>Click a car to visit a team website </p>
    </header>
    
    <div class="container">
      <div class="grid">
        <div class="card">
          <a href="https://www.mercedes-benz.com/en/">
            <img src="https://www.formula1.com/en/latest/article/first-look-mercedes-unveil-their-2024-f1-car-ahead-of-silverstone-shakedown.4wCM4N7SXbMDIGtJQTMimM" width="100" alt="Mercedes">
          </a>
          <h3>Mercedes</h3>
        </div>
        
         <div class="card">
          <a href="https://www.mclaren.com/">
            <img src="https://www.racefans.net/wp-content/uploads/2024/01/racefansdotnet-23-01-16-17-31-43-1-McLaren-F1-2024-Livery-Front.jpg" width="100" alt="McLaren">
          </a>
           <h3>Mclaren</h3>
         </div>
         
         <div class="card">
          <a href="https://www.williamsf1.com/">
            <img src="https://www.formula1.com/en/latest/article/first-look-williams-show-off-their-new-livery-for-2026-f1-season.4tY1qBa2lWI35hqxV6AH1g" width="100" alt="Williams">
          </a>
           <h3>Williams</h3>
         </div>
      </div>
    </div>
  </body>
</html>
